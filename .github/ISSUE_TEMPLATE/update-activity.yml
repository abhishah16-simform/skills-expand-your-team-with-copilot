name: Update an Existing Activity
description: Request changes to an existing extracurricular activity on the website
title: "Update activity: [Activity Name]"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request changes to an existing extracurricular activity on the Mergington High School Activities website. Fill in the activity name and only the fields you want to change. Fields left blank will remain unchanged.

  - type: input
    id: activity-name
    attributes:
      label: Activity Name
      description: The exact name of the activity you want to update, as it currently appears on the website.
      placeholder: e.g. "Chess Club"
    validations:
      required: true

  - type: textarea
    id: new-description
    attributes:
      label: New Description (optional)
      description: The updated description for the activity. Leave blank to keep the current description.
      placeholder: e.g. "Learn chess strategies, play friendly matches, and compete in regional tournaments."
    validations:
      required: false

  - type: checkboxes
    id: new-days
    attributes:
      label: New Meeting Days (optional)
      description: Update the days of the week the activity meets. Leave all unchecked to keep the current days.
      options:
        - label: Monday
        - label: Tuesday
        - label: Wednesday
        - label: Thursday
        - label: Friday
        - label: Saturday
        - label: Sunday
    validations:
      required: false

  - type: input
    id: new-start-time
    attributes:
      label: New Start Time (optional)
      description: The updated start time. Use 12-hour format (e.g. 3:30 PM). Leave blank to keep the current start time.
      placeholder: e.g. "3:30 PM"
    validations:
      required: false

  - type: input
    id: new-end-time
    attributes:
      label: New End Time (optional)
      description: The updated end time. Use 12-hour format (e.g. 5:00 PM). Leave blank to keep the current end time.
      placeholder: e.g. "5:00 PM"
    validations:
      required: false

  - type: input
    id: new-max-participants
    attributes:
      label: New Maximum Number of Participants (optional)
      description: The updated maximum number of students allowed. Leave blank to keep the current limit.
      placeholder: e.g. "25"
    validations:
      required: false

  - type: dropdown
    id: new-difficulty
    attributes:
      label: New Difficulty Level (optional)
      description: Update the difficulty level if needed. Leave at "(no change)" to keep the current level.
      default: 0
      options:
        - "(no change)"
        - "(none)"
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Briefly explain why this update is needed so others understand the context.
      placeholder: e.g. "The room booking changed, so we need to update the meeting time."
    validations:
      required: true
